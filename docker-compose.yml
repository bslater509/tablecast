services:
  tablecast:
    build:
      context: .
      dockerfile: Dockerfile
      labels:
        - "com.tablecast.version=v2.2026-06-12b"
    container_name: tablecast
    restart: unless-stopped
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      # Needed by docker-entrypoint.sh to chown volume directories to tablecast user
      - CHOWN
      # Needed by su to switch to the tablecast user for the Node.js process
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 1g

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      # Bind to 0.0.0.0 so LAN devices (phones) can connect — required per AGENTS.md
      - "0.0.0.0:3001:3001"
      # HTTPS port for PWA (Progressive Web App) support — self-signed cert generated at startup
      - "0.0.0.0:3443:3443"

    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/server/prisma/data/tablecast.db
      - PORT=3001
      # Structured JSON logging level: silent | error | warn | info | debug
      - LOG_LEVEL=info
      # Uncomment to enable DEBUG namespace logging (legacy): tablecast:*, tablecast:socket, tablecast:auth, etc.
      # - DEBUG=tablecast:*
      # Optional: REFERENCE_SYNC_ON_STARTUP=true — refresh 5etools cache on boot
      # Optional: FIVE_E_TOOLS_SRC_URL — override 5etools mirror URL for reference data
      # Optional: FIVE_E_TOOLS_IMG_URL — override 5etools image CDN URL
      # Optional: RCLONE_REMOTE — default rclone remote destination (e.g. gdrive:tablecast-backups)

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Persistent SQLite database file — survives container rebuilds
      - tablecast-db:/app/server/prisma/data

      # Uploads directory — map images, token art, etc.
      - tablecast-uploads:/app/server/uploads

      # D&D 5e cache directory for HTTP-fetched reference data
      - tablecast-5etools-cache:/app/server/uploads/5etools-cache

      # Local backup archives (zip files)
      - tablecast-backups:/app/server/backups

      # Writable tmp directory needed for read_only container
      - tablecast-tmp:/tmp

# Named volumes — Docker manages the storage location on the host
volumes:
  tablecast-db:
    driver: local
  tablecast-uploads:
    driver: local
  tablecast-5etools-cache:
    driver: local
  tablecast-backups:
    driver: local
  tablecast-tmp:
    driver: local
