services:
  tablecast:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tablecast
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      # Bind to 0.0.0.0 so LAN devices (phones) can connect — required per AGENTS.md
      - "0.0.0.0:3001:3001"

    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/server/prisma/data/tablecast.db
      - PORT=3001
      # Structured JSON logging level: silent | error | warn | info | debug
      - LOG_LEVEL=info
      # Uncomment to enable DEBUG namespace logging (legacy): tablecast:*, tablecast:socket, tablecast:auth, etc.
      # - DEBUG=tablecast:*

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Persistent SQLite database file — survives container rebuilds
      - tablecast-db:/app/server/prisma/data

      # Uploads directory — map images, token art, etc.
      - tablecast-uploads:/app/server/uploads

      # D&D 5e references repositories (5etoolssrc and 5etoolsimg)
      - ./5etoolssrc:/app/server/5etoolssrc
      - ./5etoolsimg:/app/server/5etoolsimg

# Named volumes — Docker manages the storage location on the host
volumes:
  tablecast-db:
    driver: local
  tablecast-uploads:
    driver: local
